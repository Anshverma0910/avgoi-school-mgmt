spring.application.name=school-mgmt

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/avgoi_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

# AI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY:temporary_key}

# Infrastructure Hosts (Crucial for Docker)
spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.data.redis.host=${REDIS_HOST:localhost}

# Health Checks (expose health over HTTP so /actuator/health works)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT (use env JWT_SECRET in production, min 256 bits for HS256)
jwt.secret=${JWT_SECRET:AvGoI-School-Mgmt-Secret-Key-For-HS256-Must-Be-At-Least-256-Bits-Long}
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=2592000000

# Dev only: set to true to enable POST /api/auth/reset-password (set to false in production)
app.allow-password-reset=${ALLOW_PASSWORD_RESET:true}